<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="dk">
<head>
    <meta charset="UTF-8">
    <title>Attractions</title>
</head>
<body>
<h1>Alle Attraktioner</h1>

<table>
    <tr>
        <th>Navn</th> <th>Beskrivelse</th> <th>By</th>
    </tr>
    <tr th:each="attraction:${attractions}">
        <td th:text="${attraction.name}"></td>
        <td th:text="${attraction.description}"></td>
        <td th:text="${attraction.city}"></td>

        <td>
            <a th:href="@{/attractions/{name}/tags(name=${attraction.name})}">Tags</a>
        </td>
    </tr>
</table>

</body>
</html>
